<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CST Dealer Locator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <img src="Logo.jpeg" alt="CST Logo" class="logo">

    <h1>CST Dealer Locator</h1>

    <p class="subtitle">
        คำแนะนำ:โปรดเตรียมข้อมูลสอบถามดังนี้
        - รุ่นรถที่ใช้
        - ราคายาง
        - ค่าบริการติดตั้ง/ถ่วงล้อ
        - รุ่นยาง CST TIRES
        - ไซส์ยางที่ต้องการ
    </p>

    <div class="search-box">

        <select id="province">
            <option value="">-- เลือกจังหวัด --</option>
        </select>

        <select id="district" disabled>
            <option value="">-- เลือกเขต / อำเภอ --</option>
        </select>

        <div class="button-group">
            <button id="searchBtn">
                ค้นหาร้านค้า
            </button>

            <button id="resetBtn" class="secondary-btn">
                ล้างการค้นหา
            </button>
        </div>

    </div>

    <div id="loading" class="loading">
        กำลังโหลดข้อมูล...
    </div>

    <div id="resultCount" class="result-count"></div>

    <div id="results" class="results"></div>
<div class="all-map">
    <p>หากไม่พบร้านตัวแทนจำหน่ายใกล้เคียง สามารถดูร้านทั้งหมดได้ที่ Google Maps</p>

    <a
       href="https://cstmotothailand.com/cst-dealers/"
       target="_blank"
       class="all-map-btn">

       🗺️ ดูตัวแทนจำหน่ายทั้งหมด

  </a>

</div>
</div>

<footer>
    © 2026 CST Dealer Locator
</footer>

<script src="script.js"></script>

</body>
</html>
